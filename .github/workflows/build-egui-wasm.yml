name: Build and Deploy Cherry egui WASM App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-egui-wasm:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      # Keep in sync with rust-toolchain.toml
      with:
        toolchain: nightly-2025-11-15
        targets: wasm32-unknown-unknown
        components: rust-src

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: "crates -> target"

    - name: Install Binaryen
      run: |
        VERSION="version_126"
        wget https://github.com/WebAssembly/binaryen/releases/download/${VERSION}/binaryen-${VERSION}-x86_64-linux.tar.gz
        tar -xzf binaryen-${VERSION}-x86_64-linux.tar.gz
        mkdir -p $HOME/.local/bin
        mv binaryen-${VERSION}/bin/* $HOME/.local/bin/
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        rm -rf binaryen-${VERSION} binaryen-${VERSION}-x86_64-linux.tar.gz

    - name: Verify Binaryen installation
      run: wasm-opt --version

    - name: Install trunk
      uses: jetli/trunk-action@v0.5.1
      with:
        version: "latest"

    - name: Download rii.db
      # Downloads the release matching the ria crate version in Cargo.toml.
      # Keep the ria version and this download tag in sync.
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release download v2.0.0 \
          --repo kmdouglass/refractiveindex.info-adapters \
          --pattern "rii.db" \
          --dir crates/cherry-rs/data/

    - name: Run cherry-rs tests (native)
      working-directory: ./crates
      run: cargo test -p cherry-rs --features gui,ri-info

#    - name: Clippy
#      working-directory: ./crates
#      run: cargo clippy -p cherry-rs --features gui,ri-info -- -D warnings

    - name: Check formatting
      working-directory: ./crates
      run: cargo fmt -p cherry-rs --check

    - name: Generate rii-index.json
      working-directory: ./crates
      run: |
        cargo run -p cherry-rs --bin gen-rii-index \
          --features ri-info --release \
          -- --output ../www/egui/assets/rii-index.json

    - name: Copy rii.db to WASM assets
      run: cp crates/cherry-rs/data/rii.db www/egui/assets/rii.db

    - name: Setup Pages
      id: pages
      uses: actions/configure-pages@v5

    - name: Build WASM app
      working-directory: ./www/egui
      run: trunk build --release --public-url "${{ steps.pages.outputs.base_path }}/"

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: www/egui/dist

  deploy:
    needs: build-egui-wasm
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: "pages"
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
